name: Bug report
description: Report reproducible incorrect behavior that is not a private vulnerability.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include commit, commands, inputs, and deterministic seed where applicable.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact and affected invariants
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, architecture, build mode, and relevant versions.
    validations:
      required: true
